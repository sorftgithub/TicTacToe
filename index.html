<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The 'X' and 'O' Game">
    <title>Tic-Tac-Toe Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <form id="setup-form" class="setup-container">
        <h2>Enter Player Names</h2>
        <div class="input-group">
            <label for="p1-name">Player 1 (X):</label>
            <input type="text" id="p1-name" required placeholder="e.g., Alice">
        </div>
        <div class="input-group">
            <label for="p2-name">Player 2 (O):</label>
            <input type="text" id="p2-name" required placeholder="e.g., Bob">
        </div>
        <button type="submit" id="start-btn">Start Game</button>
    </form>
    <div id="game-container" class="game-container">
        <div class="scoreboard">
            <div class="score-card">
                <span id="p1-score-label">Player 1</span>
                <span id="p1-score-display" class="score-num">0</span>
            </div>
            <div class="score-divider">vs</div>
            <div class="score-card">
                <span id="p2-score-label">Player 2</span>
                <span id="p2-score-display" class="score-num">0</span>
            </div>
        </div>
        <h2 id="status"></h2>
        <div id="grid" class="grid">
            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>
        </div>

        <div class="button-actions">
            <button id="switch-btn">🔄Switch Starting Player</button>
            <button id="reset-btn">Restart Game</button>
        </div>
    </div>
    <script type="text/javascript"  src="js/main.js"></script>
</body>
</html>
